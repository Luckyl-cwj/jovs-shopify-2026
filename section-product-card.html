<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>
<style>
  img {
    max-width: 100%;
  }

  .section-product-card {
    font-family: Inter;
    width: 851px;
    max-width: 100%;

  }

  .content {
    background: #015A20;
    color: #fff;
    border-radius: 10px;
    padding: 10px;
    overflow: hidden;
    display: flex;
    gap: 40px;
  }

  .content .lft {
    width: 190px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
  }

  .content .rgt {
    padding-top: 32px;
  }

  .wrap .tit {
    font-family: Inter;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.1;
    margin: 0;

  }

  .wrap .des-wrap {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    padding-right: 30px;
  }

  .wrap .des {
    font-weight: 500;
    font-size: 16px;
    line-height: 120%;
    max-width: 64%;
    margin: 0;
    opacity: .8;
  }

  .wrap .btn {
    font-weight: 700;
    font-size: 20px;
    line-height: 100%;
    padding: 12px 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 100px;
    border-radius: 8px;
    background: #fff;
    color: #000;
    text-decoration: none;
    border: none;
    margin-top: 12px;
  }
  @media(max-width:992px){
    .wrap .tit{
      font-size: 24px;
    }
    .wrap .des{
      font-size: 16px;
    }
  }
</style>

<body>
  <section class="section-product-card">
    <div class="wrap">
      <div class="content">
        <div class="lft">
          <img src="./images/section-product-card-left-product.png" alt="">
        </div>
        <div class="rgt">
          <p class="tit">Full-Spectrum Red LightTherapy Mat</p>
          <div class="des-wrap">
            <p class="des">Modular Deep Red Light Repair, engineered forfuller body renewal Modular Deep Red Light
              Repair, engineered forfuller body renewal
            </p>
            <div>
              <a href="" class="btn">
                Buy Now
              </a>
            </div>
          </div>
        </div>

      </div>
      <img src="./images/section-product-card-bottom-img.png" alt="">
    </div>
  </section>
</body>

</html>

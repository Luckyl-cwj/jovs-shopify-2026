<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>
<style>
  body {
    margin: 0;
  }

  img {
    max-width: 100%;
  }

  #blog-section-product-card-2026 {
    font-family: Inter;
    width: 850px;
    max-width: 100%;

  }

  #blog-section-product-card-2026 .content {
    background: #015A20;
    color: #fff;
    border-radius: 10px;
    padding: 10px;
    overflow: hidden;
    display: flex;
    gap: 40px;
  }

  #blog-section-product-card-2026 .content .lft {
    width: 190px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
  }

  #blog-section-product-card-2026 .content .rgt {
    padding-top: 32px;
  }

  #blog-section-product-card-2026 .wrap .tit {
    font-family: Inter;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.1;
    margin: 0;
    color: #fff;
  }

  #blog-section-product-card-2026 .wrap .des-wrap {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    padding-right: 30px;
  }

  #blog-section-product-card-2026 .wrap .des {
    font-weight: 500;
    font-size: 16px;
    line-height: 120%;
    max-width: 64%;
    margin: 0;
    opacity: .8;
    color: #fff;
  }

  #blog-section-product-card-2026 .wrap .btn {
    font-weight: 700;
    font-size: 20px;
    line-height: 100%;
    padding: 12px 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 100px;
    border-radius: 8px;
    background: #fff;
    color: #000;
    text-decoration: none;
    border: none;
    margin-top: 12px;
  }

  @media(max-width:992px) {
    #blog-section-product-card-2026 {
      width: unset;
    }

    #blog-section-product-card-2026 .content {
      gap: 18px;
      padding: 14px;
      flex-direction: column;
    }

    #blog-section-product-card-2026 .wrap .tit {
      font-size: 14px;
      line-height: 1.1;
      text-align: center;
    }

    #blog-section-product-card-2026 .wrap .des {
      font-size: 12px;
      line-height: 1.1;
      font-weight: 500;
      max-width: 90%;
      text-align: center;
      margin: 0 auto 0;

    }

    #blog-section-product-card-2026 .content .lft {
      width: 126px;
      text-align: center;
      margin: 0 auto;
    }

    #blog-section-product-card-2026 .content .rgt {
      padding-top: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #blog-section-product-card-2026 .wrap .des-wrap {
      padding-right: 0;
      margin-top: 8px;
      flex-direction: column;
    }

    #blog-section-product-card-2026 .content .btn-wrap {
      display: inline-flex;
      align-items: end;
      margin-left: 4px;
      padding-bottom: 4px;
      width: fit-content;
      margin: 12px auto 0;
    }

    #blog-section-product-card-2026 .wrap .btn {
      margin-top: 0;
      height: 30px;
      padding: 0 24px;
      font-size: 12px;
      min-width: unset;
    }
  }
</style>

<body>
  <section id="blog-section-product-card-2026">
    <div class="wrap">
      <div class="content">
        <div class="lft">
          <img
            src="https://cdn.shopify.com/s/files/1/0616/3326/5917/files/section-product-card-left-product.webp?v=1772695753"
            alt="">
        </div>
        <div class="rgt">
          <p class="tit">Full-Spectrum Red LightTherapy Mat</p>
          <div class="des-wrap">
            <p class="des">Modular Deep Red Light Repair, engineered forfuller body renewal Modular Deep Red Light
              Repair, engineered forfuller body renewal
            </p>
            <div class="btn-wrap">
              <a href="https://jovs.com/products/infrared-light-therapy-mat" class="btn">
                Buy Now
              </a>
            </div>
          </div>
        </div>
      </div>
      <img
        src="https://cdn.shopify.com/s/files/1/0616/3326/5917/files/section-product-card-bottom-img.webp?v=1772695754"
        alt="">
    </div>
  </section>
</body>

</html>

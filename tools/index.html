<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crawler Tools</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #dbe3f0;
        --link: #1d4ed8;
        --link-hover: #1e40af;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        background: radial-gradient(circle at top left, #eef3ff, var(--bg) 55%);
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
      }

      .panel {
        width: 100%;
        max-width: 760px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 22px;
      }

      .desc {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .entry-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .entry-list a {
        display: block;
        text-decoration: none;
        color: var(--link);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
        background: #f8faff;
        font-weight: 600;
        transition: all 0.15s ease;
      }

      .entry-list a:hover {
        color: var(--link-hover);
        border-color: #bfdbfe;
        background: #eff6ff;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Crawler Links</h1>
      <p class="desc">Quick access to the 3 pages you kept.</p>

      <ul class="entry-list">
        <li><a href="./checkLink/checkLink.html">Single Page Link Checker</a></li>
        <li><a href="./checkLink/batchCheck.html">Batch Link Checker</a></li>
        <li><a href="./checkLink/urls.txt">Crawl Output: urls.txt</a></li>
      </ul>
    </main>
  </body>
</html>
